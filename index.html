<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>고대 안암 AR 보물찾기 투어</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; font-family: sans-serif;
        }
        .status-card {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; text-align: center; width: 80%; pointer-events: auto;
        }
        .distance-tag { color: #00ffcc; font-weight: bold; font-size: 1.2em; }
        .mission-text { margin-top: 5px; color: #ffcc00; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui-layer">
        <div class="status-card">
            <div id="step-info">퀘스트 시작: 첫 번째 지점으로 이동하세요</div>
            <div class="distance-tag" id="distance-info">--- m</div>
            <div class="mission-text" id="mission-info">준비되셨나요?</div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
    >
        <a-entity id="ar-object"
            gltf-model=""
            scale="10 10 10"
            gps-entity-place="latitude: 0; longitude: 0;"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
        </a-entity>

        <a-nft id="nft-target"
            type="nft"
            url="YOUR_NFT_MARKER_URL" 
            visible="false">
            <a-entity id="final-treasure"
                gltf-model="url(models/model5_treasure.glb)"
                scale="50 50 50">
            </a-entity>
        </a-nft>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // 1. 보물 데이터 설정 (5개 단계)
        const questData = [
            { id: 1, lat: 37.592257, lon: 127.021151, model: 'models/model1_hint.glb', hint: "서관 계단 근처를 찾아보세요!" },
            { id: 2, lat: 37.592000, lon: 127.021500, model: 'models/model2_hint.glb', hint: "중앙도서관 방향으로 가보세요." },
            { id: 3, lat: 37.591800, lon: 127.022000, model: 'models/model3_hint.glb', hint: "다람쥐 길을 따라 내려가세요." },
            { id: 4, lat: 37.591570, lon: 127.022455, model: 'models/model4_hint.glb', hint: "건물 입구에 도달했습니다. 안으로 가세요!" },
            { id: 5, type: 'indoor', hint: "포스터를 비추어 보물을 여세요!" }
        ];

        let currentStep = 0;
        const arObject = document.getElementById('ar-object');
        const nftTarget = document.getElementById('nft-target');
        const stepInfo = document.getElementById('step-info');
        const distInfo = document.getElementById('distance-info');
        const missionInfo = document.getElementById('mission-info');

        // 초기 모델 로드
        function loadStep(index) {
            const data = questData[index];
            if (data.type === 'indoor') {
                // 실내 모드로 전환
                arObject.setAttribute('visible', 'false');
                nftTarget.setAttribute('visible', 'true');
                stepInfo.innerText = "마지막 단계: 실내 탐색";
                missionInfo.innerText = data.hint;
                distInfo.innerText = "이미지 인식 대기 중...";
            } else {
                // GPS 모드 업데이트
                arObject.setAttribute('gps-entity-place', `latitude: ${data.lat}; longitude: ${data.lon};`);
                arObject.setAttribute('gltf-model', `url(${data.model})`);
                stepInfo.innerText = `단계 ${index + 1} / 5`;
                missionInfo.innerText = data.hint;
            }
        }

        // 초기화 실행
        loadStep(currentStep);

        // 위치 업데이트 이벤트 리스너
        window.addEventListener('gps-camera-update-position', (e) => {
            if (currentStep >= questData.length - 1) return; // 마지막 단계면 중단

            const dist = arObject.getAttribute('distanceMsg');
            if (dist) {
                const distanceVal = parseFloat(dist);
                distInfo.innerText = `${distanceVal} m 남음`;

                // 10미터 이내로 접근하면 다음 단계로!
                if (distanceVal < 10) {
                    alert("단서를 찾았습니다! 다음 장소로 이동합니다.");
                    currentStep++;
                    loadStep(currentStep);
                }
            }
        });
    </script>
</body>
</html>
